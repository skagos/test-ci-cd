name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract tag
        id: meta
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/test-app-goska:${{ steps.meta.outputs.TAG }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/test-app-goska:${{ steps.meta.outputs.TAG }}

      - name: Tag as latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/test-app-goska:${{ steps.meta.outputs.TAG }} \
                     ${{ secrets.DOCKER_USERNAME }}/test-app-goska:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/test-app-goska:latest